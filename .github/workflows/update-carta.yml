name: Update carta from Google Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: update-carta
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build carta-data.json
        env:
          SHEET_CATEGORIAS_URL: ${{ vars.SHEET_CATEGORIAS_URL }}
          SHEET_PLATOS_URL: ${{ vars.SHEET_PLATOS_URL }}
        run: python scripts/build-carta.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- js/carta-data.json; then
            echo "Sin cambios en carta-data.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/carta-data.json
          git commit -m "chore(carta): actualizar desde Google Sheet"
          git push
